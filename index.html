<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- daisyUI and Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
        body{
            background-color: #EEF4FF;
        }
        .green{
            color: #10B981;
        }
        .red{
            color: #EF4444;
        }
    </style>
</head>

<body>
    <section class="border-2 border-red-200 max-w-[1280px] mx-auto">
        <h1 class="text-2xl font-bold mb-2">Job Application Tracker</h1>

    <div class="grid grid-cols-3 gap-5 items-center">
        <div class="bg-white p-3 m-3 rounded-lg">
            <h3 class="">Total</h3>
            <p class="text-lg font-bold">8</p>
        </div>
        <div class="bg-white p-3 m-3 rounded-lg">
            <h3 class="">Interview</h3>
            <p class="text-lg font-bold green">0</p>
        </div>
        <div class="bg-white p-3 m-3 rounded-lg">
            <h3 class="">Rejected</h3>
            <p class="text-lg font-bold red">0</p>
        </div>
    </div>

    <br><hr class="border border-gray-200"><br>

    <section>
        <h1 class="text-xl font-bold mb-2">Available Job</h1>

        <div class="flex gap-8">
                <button class="btn btn-primary btn-soft text-newtral px-14">All</button>
            <button class="btn btn-primary btn-soft text-newtral px-10">Interview</button>
            <button class="btn btn-primary btn-soft text-newtral px-10">Rejected</button>
        </div>
    </section>
    </section>
</body>

</html>
