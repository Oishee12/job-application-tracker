<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- daisyUI and Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome cdn -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }

        body {
            background-color: #EEF4FF;
        }

        .green {
            color: #10B981;
        }

        .red {
            color: #EF4444;
        }

        .grey {
            color: #64748B;
        }

        .button {
            background-color: white;
        }

        .button:hover {
            background-color: blue;
            color: white;
        }
    </style>
</head>

<body>
    <section class="border-2 border-red-200 max-w-[1280px] mx-auto">
        <h1 class="text-2xl font-bold mb-2">Job Application Tracker</h1>

        <div class="grid grid-cols-3 gap-5 justify-end">
            <div class="bg-white p-3 my-3 rounded-lg">
                <h3 class="">Total</h3>
                <p class="text-lg font-bold">8</p>
            </div>
            <div class="bg-white p-3 m-3 rounded-lg">
                <h3 class="">Interview</h3>
                <p class="text-lg font-bold green">0</p>
            </div>
            <div class="bg-white p-3 m-3 rounded-lg">
                <h3 class="">Rejected</h3>
                <p class="text-lg font-bold red">0</p>
            </div>
        </div>

        <br>
        <hr class="border border-gray-200"><br>

        <section>
            <div class="flex justify-between">
                <h1 class="text-xl font-bold mb-2">Available Job</h1>
                <p>8 Jobs</p>
            </div>

            <div class="flex gap-8 mb-4">
                <button class="button btn text-newtral px-14">All</button>
                <button class="button btn text-newtral px-10">Interview</button>
                <button class="button btn text-newtral px-10">Rejected</button>
            </div>
        </section>

        <section>
            <div>
                <div class="bg-white p-3 my-3 rounded-lg">
                    <div class="flex justify-between">
                        <h3 class="text-lg font-bold">Mobile First Corp</h3>
                        <div class="border border-gray-400 h-7 w-7 flex justify-center items-center rounded-full"><i class="fa-regular fa-trash-can"></i></div>
                    </div>
                    <p class="grey">React Native Developer</p><br>
                    <div class="flex gap-3 justify-start items-center">
                        <p class="grey">Remote</p>
                        <p class="bg-[#64748B] h-[6px] w-[6px] rounded-full"></p>
                        <p class="grey">Full-time</p>
                        <p class="bg-[#64748B] h-[6px] w-[6px] rounded-full"></p>
                        <p class="grey">$130,000 - $175,000</p> <br>
                    </div><br>
                    <button class="btn btn-outline bg-[#e4edfd] border-none mb-1 text-gray-600">Not Applied</button>
                    <p class="grey">Build cross-platform mobile applications using React Native. Work on products used by millions of users worldwide.</p>
                    <br>
                    <button class="btn btn-outline btn-success">Interview</button>
                    <button class="btn btn-outline btn-error">
                        Rejected
                    </button>
                </div>
            </div>
        </section>
    </section>
</body>

</html>
